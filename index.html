<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Woewieeee</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;

        /* Background image */
        background: url("/mnt/data/a4fae88d-6436-4571-9bf6-b48c99f3b679.png") no-repeat center center/cover;
    }

    /* Pink overlay */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 182, 193, 0.55);
    }

    .card {
        position: relative;
        max-width: 600px;
        padding: 25px;
        border-radius: 20px;
        background: rgba(255, 105, 180, 0.25);
        backdrop-filter: blur(6px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    h1 {
        margin-bottom: 15px;
        font-size: 28px;
    }

    p {
        font-size: 18px;
        line-height: 1.6;
    }
</style>

</head>

<body>
<div class="overlay"></div>

<div class="card">
    <h1>To Woewieeee 💗</h1>
    <p>
        I appreciate you in everything that you do, not just to me but to yourself as well.<br><br>

        I'm sorry I offered to sleep kanina po, I was making this po gift po kasi.<br><br>

        Thank you for being patient with me.
    </p>
</div>

</body>
</html>
